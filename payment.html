<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Checkout - FIFA 26 WORLD</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="payment.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


</head>

<body>

    <div class="checkout-box">

        <h2>Secure Checkout 🔒</h2>

        <form onsubmit="placeOrder(event)">

            <h4>Delivery Address</h4>

            <div class="mb-3">
                <input type="text" class="form-control" placeholder="Full Name" required>
            </div>

            <div class="mb-3">
                <input type="tel" class="form-control" placeholder="Phone Number" required>
            </div>

            <div class="mb-3">
                <textarea class="form-control" placeholder="Full Address" required></textarea>
            </div>

            <div class="mb-3">
                <input type="text" class="form-control" placeholder="City" required>
            </div>

            <div class="mb-3">
                <input type="text" class="form-control" placeholder="Pincode" required>
            </div>

            <h4>Card Details</h4>

            <div class="mb-3">
                <input type="text" class="form-control" placeholder="Card Holder Name" required>
            </div>

            <div class="mb-3">
                <input type="text" class="form-control" placeholder="Card Number" maxlength="16" required>
            </div>

            <div class="row">
                <div class="col-6 mb-3">
                    <input type="text" class="form-control" placeholder="MM/YY" required>
                </div>

                <div class="col-6 mb-3">
                    <input type="text" class="form-control" placeholder="CVV" maxlength="3" required>
                </div>
            </div>

            <button type="submit" class="btn btn-premium w-100">PLACE ORDER</button>

        </form>

        <a href="odder.html" class="back-link">← Back to Cart</a>

    </div>

    <script src="payment.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>



</body>

</html>
